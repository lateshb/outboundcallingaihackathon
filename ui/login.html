<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OutboundAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030303;
      --card-bg: rgba(18, 18, 18, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: #00ff88;
      --accent: #00ff88;
      --accent-glow: rgba(0, 255, 136, 0.4);
      --accent2: #00ccff;
      --accent2-glow: rgba(0, 204, 255, 0.4);
      --text: #ffffff;
      --text-muted: #8e8e93;
      --error: #ff4d4d;
      --font: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Cosmic Ambient Animated Background */
    .bg-aurora {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.45;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: drift-1 25s infinite alternate ease-in-out;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
      bottom: -150px;
      right: -150px;
      animation: drift-2 30s infinite alternate ease-in-out;
    }

    .orb-3 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #9d4edd 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: drift-3 20s infinite alternate ease-in-out;
    }

    @keyframes drift-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(150px, 100px) scale(1.2); }
    }

    @keyframes drift-2 {
      0% { transform: translate(0, 0) scale(1.1); }
      100% { transform: translate(-180px, -120px) scale(0.9); }
    }

    @keyframes drift-3 {
      0% { transform: translate(-50%, -50%) translate(-80px, 60px); }
      100% { transform: translate(-50%, -50%) translate(80px, -60px); }
    }

    /* Glassmorphic Login Container */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 2.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(25px) saturate(190%);
      -webkit-backdrop-filter: blur(25px) saturate(190%);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 10;
      animation: scale-up 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scale-up {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .header-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-logo h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .header-logo p {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      padding-right: 3rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 400;
      outline: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-wrapper input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 0 1px rgba(0, 255, 136, 0.1);
      background: rgba(0, 0, 0, 0.6);
    }

    /* Password visibility toggle button */
    .toggle-password {
      position: absolute;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--text);
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #000000;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: all 0.6s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(0, 255, 136, 0.45);
    }

    .btn-submit:hover::after {
      left: 100%;
    }

    .btn-submit:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .btn-submit:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-submit:disabled::after {
      display: none;
    }

    /* Error Alert */
    .error-alert {
      background: rgba(255, 77, 77, 0.12);
      border: 1px solid rgba(255, 77, 77, 0.25);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      color: var(--error);
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      animation: slide-down 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="bg-aurora">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="header-logo">
      <h1>OutboundAI</h1>
      <p>Voice agent calling platform admin login</p>
    </div>

    <div id="error-box" class="error-alert">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <span id="error-message">Invalid credentials.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" required placeholder="name@domain.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <!-- Eye outline -->
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn-submit">
        <span id="btn-text">Sign In</span>
        <div id="btn-spinner" class="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Eye-off SVG path
        eyeIcon.innerHTML = `<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.39 2.7-3.16 3.44-5.18-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>`;
      } else {
        passwordInput.type = 'password';
        // Eye open SVG path
        eyeIcon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const errorMessage = document.getElementById('error-message');
      const btnSubmit = document.getElementById('btn-submit');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');

      // Hide previous error
      errorBox.style.display = 'none';
      
      // Show loading state
      btnSubmit.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Redirect on success
          window.location.href = '/';
        } else {
          // Display error returned from backend
          errorMessage.innerText = data.detail || 'Login failed. Please try again.';
          errorBox.style.display = 'flex';
          
          // Re-enable form
          btnSubmit.disabled = false;
          btnText.style.display = 'block';
          btnSpinner.style.display = 'none';
        }
      } catch (err) {
        errorMessage.innerText = 'Network error. Please verify your connection.';
        errorBox.style.display = 'flex';
        
        // Re-enable form
        btnSubmit.disabled = false;
        btnText.style.display = 'block';
        btnSpinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
